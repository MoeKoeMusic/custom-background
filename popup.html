<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      text-align: center;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h2 {
      margin: 0;
      color: #333;
      font-size: 18px;
    }
    
    .info {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
      line-height: 1.5;
      text-align: left;
    }
    
    .tip {
      background: #fff3cd;
      border: 1px solid #ffeaa7;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 12px;
      color: #856404;
      text-align: left;
    }
    
    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      width: 100%;
    }
    
    button {
      flex: 1;
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    
    button:hover {
      background: #0056b3;
    }
    
    button.secondary {
      background: #6c757d;
    }
    
    button.secondary:hover {
      background: #545b62;
    }
    
    .footer {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #eee;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>🎨 自定义背景</h2>
    </div>
    
    <div class="info">
      <p><strong>使用说明：</strong></p>
      <p>• 在个人中心页面，背景右上角有 🖼️ 按钮</p>
      <p>• 在歌单封面右上角有 📷 按钮</p>
      <p>• 点击按钮选择本地图片即可替换</p>
    </div>
    
    <div class="tip">
      <strong>💡 提示：</strong>建议使用文件大小适中的图片以避免性能问题
    </div>
    
    <!-- <div class="button-group">
      <button id="clearAll" class="secondary">清除所有自定义</button>
    </div> -->
    
    <div class="footer">
      <p>© 2024 MoeKoe Music Plugin</p>
      <p>自定义背景插件 v1.0</p>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
